name: Prepare release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-prepare:
    runs-on: [self-hosted, self-hosted-gregor]
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release') }}"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.GH_AUTOMATION_APP_PRIVATE_KEY }}

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Compute release plan
        id: plan
        run: |
          set -euo pipefail
          git fetch --tags
          release_plan="$(nix develop --command scripts/release plan --workspace .)"
          version="$(printf '%s\n' "$release_plan" | awk -F= '$1 == "version" { print $2 }')"
          release_type="$(printf '%s\n' "$release_plan" | awk -F= '$1 == "release_type" { print $2 }')"
          if [ -z "$version" ] || [ -z "$release_type" ]; then
            printf 'release plan did not produce a version and release type\n' >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'branch=release/v%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Switch to release branch
        env:
          RELEASE_BRANCH: ${{ steps.plan.outputs.branch }}
        run: git switch -C "$RELEASE_BRANCH"

      - name: Prepare release metadata
        env:
          RELEASE_VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail
          nix develop --command scripts/release prepare --workspace . --version "$RELEASE_VERSION" --date "$(date +%F)"

      - name: Check for release metadata changes
        id: diff
        env:
          RELEASE_VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            printf 'release metadata already up to date for v%s\n' "$RELEASE_VERSION"
            printf 'changed=false\n' >> "$GITHUB_OUTPUT"
          else
            printf 'changed=true\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Create signed release commit and push branch
        if: ${{ steps.diff.outputs.changed == 'true' }}
        uses: slipstream-eng/gha-workflows/.github/actions/release-sign-commit@main
        with:
          release-signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
          release-signing-name: ${{ vars.RELEASE_BOT_NAME }}
          release-signing-email: ${{ vars.RELEASE_BOT_EMAIL }}
          github-token: ${{ steps.app-token.outputs.token }}
          version-override: ${{ steps.plan.outputs.version }}
          commit-message: "chore: release v{version}"
          create-tag: "false"
          create-release: "false"

      - name: Open or update release PR
        if: ${{ steps.diff.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_VERSION: ${{ steps.plan.outputs.version }}
          RELEASE_BRANCH: ${{ steps.plan.outputs.branch }}
        run: |
          set -euo pipefail
          pr_body="Prepare release v$RELEASE_VERSION.

          CI publishes release-candidate Docker image links on the PR; final release entries are created only after merge to main."

          superseded_prs="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,headRefName \
            --jq --arg branch "$RELEASE_BRANCH" '.[] | select(.headRefName | startswith("release/v")) | select(.headRefName != $branch) | .number')"
          for superseded_pr in $superseded_prs; do
            gh pr close "$superseded_pr" --repo "$GITHUB_REPOSITORY"
          done

          existing_pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$RELEASE_BRANCH" --json number --jq '.[0].number // empty')"
          if [ -z "$existing_pr" ]; then
            gh pr create --repo "$GITHUB_REPOSITORY" \
              --head "$RELEASE_BRANCH" --base main \
              --title "chore: release v$RELEASE_VERSION" \
              --body "$pr_body"
          else
            printf 'release PR already open: #%s\n' "$existing_pr"
            gh pr edit "$existing_pr" --repo "$GITHUB_REPOSITORY" --body "$pr_body"
          fi
