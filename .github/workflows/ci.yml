name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

env:
  OTP_VERSION: "28"
  ELIXIR_VERSION: "1.19.5"

jobs:
  compile-dev:
    name: Compile dev code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore mix deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/dev
          key: ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-dev-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-dev-

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: |
          set -euo pipefail
          mix deps.get

      - name: Compile dev code with warnings as errors
        run: mix compile --warnings-as-errors --force

      - name: Pack dev compilation artifact
        run: tar -czf compiled-dev.tar.gz deps _build/dev

      - name: Upload dev compilation artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-dev-${{ github.sha }}
          path: compiled-dev.tar.gz
          retention-days: 1

  compile-test:
    name: Compile test code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore mix deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-test-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-test-

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: |
          set -euo pipefail
          mix deps.get
          MIX_ENV=test mix deps.get

      - name: Compile test code with warnings as errors
        run: MIX_ENV=test mix compile --warnings-as-errors --force

      - name: Pack test compilation artifact
        run: tar -czf compiled-test.tar.gz deps _build/test

      - name: Upload test compilation artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-test-${{ github.sha }}
          path: compiled-test.tar.gz
          retention-days: 1

  compile-prod:
    name: Compile prod code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore mix deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-prod-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-prod-

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: |
          set -euo pipefail
          MIX_ENV=prod mix deps.get --only prod

      - name: Compile prod code with warnings as errors
        run: MIX_ENV=prod mix compile --warnings-as-errors --force

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    needs: compile-dev
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Download dev compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-dev-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack dev compilation artifact
        run: tar -xzf ci-artifacts/compiled-dev.tar.gz

      - name: Check formatting
        run: mix format --check-formatted

  credo:
    name: Run Credo
    runs-on: ubuntu-latest
    needs: compile-dev
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Download dev compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-dev-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack dev compilation artifact
        run: tar -xzf ci-artifacts/compiled-dev.tar.gz

      - name: Run Credo
        run: mix credo --strict

  dialyzer:
    name: Run Dialyzer
    runs-on: ubuntu-latest
    needs: compile-dev
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Download dev compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-dev-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack dev compilation artifact
        run: tar -xzf ci-artifacts/compiled-dev.tar.gz

      # priv/plts (the Dialyzer PLT) is not part of the compiled-dev artifact
      # above (only deps + _build/dev are packed there), so without this
      # cache Dialyzer rebuilds its whole PLT from scratch on every PR.
      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-plt-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ env.OTP_VERSION }}-elixir${{ env.ELIXIR_VERSION }}-plt-

      - name: Run Dialyzer
        run: mix dialyzer --halt-exit-status

  sobelow:
    name: Run Sobelow
    runs-on: ubuntu-latest
    needs: compile-dev
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Download dev compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-dev-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack dev compilation artifact
        run: tar -xzf ci-artifacts/compiled-dev.tar.gz

      - name: Run Sobelow
        run: mix sobelow --exit

  deps-audit:
    name: Run dependency audit
    runs-on: ubuntu-latest
    needs: compile-dev
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Download dev compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-dev-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack dev compilation artifact
        run: tar -xzf ci-artifacts/compiled-dev.tar.gz

      - name: Run dependency audit
        run: mix deps.audit

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: compile-test
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Download test compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-test-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack test compilation artifact
        run: tar -xzf ci-artifacts/compiled-test.tar.gz

      - name: Run tests with warnings as errors
        run: mix test --warnings-as-errors

  assets:
    name: Run asset tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run asset tests
        run: node --test assets/test/*.mjs

  release-pr-image:
    name: Build and publish release PR image
    runs-on: ubuntu-latest
    needs:
      - compile-prod
      - format
      - credo
      - dialyzer
      - sobelow
      - deps-audit
      - test
      - assets
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    permissions:
      contents: read
      packages: write
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      IS_RELEASE_PR: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Skip non-release PR image build
        if: ${{ env.IS_RELEASE_PR != 'true' }}
        run: |
          printf 'Skipping release PR image build/publish for ordinary non-release PR.\n'

      - name: Check out repository
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Validate release PR artifact provenance
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        env:
          RELEASE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          RELEASE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_BOT_NAME:-}" ]; then
            printf 'missing RELEASE_BOT_NAME repository variable\n' >&2
            exit 1
          fi
          if [ "$(git log -1 --format=%an "$RELEASE_HEAD_SHA")" != "$RELEASE_BOT_NAME" ]; then
            printf 'release PR head commit author was not %s\n' "$RELEASE_BOT_NAME" >&2
            exit 1
          fi
          if [[ "$(git log -1 --format=%s "$RELEASE_HEAD_SHA")" == "chore: release v"* ]]; then
            :
          else
            printf 'release PR head commit message was not a release commit\n' >&2
            exit 1
          fi
          changed_files="$(git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_HEAD_SHA")"
          if [ -z "$changed_files" ]; then
            printf 'release PR did not change release metadata\n' >&2
            exit 1
          fi
          while IFS= read -r changed_file; do
            case "$changed_file" in
              mix.exs|CHANGELOG.md)
                ;;
              *)
                printf 'refusing token-bearing PR package publish for release PR file: %s\n' "$changed_file" >&2
                exit 1
                ;;
            esac
          done <<< "$changed_files"
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys

          base_sha = os.environ["RELEASE_BASE_SHA"]
          head_sha = os.environ["RELEASE_HEAD_SHA"]
          release_branch = os.environ["RELEASE_BRANCH"]


          def git_show(revision, path):
              return subprocess.check_output(
                  ["git", "show", f"{revision}:{path}"],
                  text=True,
              )


          def fail(message):
              print(message, file=sys.stderr)
              raise SystemExit(1)


          version_pattern = re.compile(r'(?m)^(\s*version:\s*")(?P<version>[^"]+)(",\s*)$')
          base_mix = git_show(base_sha, "mix.exs")
          head_mix = git_show(head_sha, "mix.exs")
          base_version = version_pattern.search(base_mix)
          head_version = version_pattern.search(head_mix)
          if not base_version or not head_version:
              fail("project version not found in release PR mix.exs")
          release_version = head_version.group("version")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?", release_version):
              fail(f"release version was not semantic: {release_version}")
          expected_mix = (
              base_mix[: base_version.start()]
              + base_version.group(1)
              + release_version
              + base_version.group(3)
              + base_mix[base_version.end() :]
          )
          if head_mix != expected_mix:
              fail("release PR mix.exs changed more than the project version")
          if release_branch != f"release/v{release_version}":
              fail("release PR branch did not match the release version")

          marker = "<!-- release-prepare inserts generated release sections below this line -->"
          base_changelog = git_show(base_sha, "CHANGELOG.md")
          head_changelog = git_show(head_sha, "CHANGELOG.md")
          marker_index = base_changelog.find(marker)
          if marker_index < 0:
              fail("changelog release insertion marker not found")
          prefix_end = marker_index + len(marker)
          prefix = base_changelog[:prefix_end]
          suffix = base_changelog[prefix_end:]
          if not head_changelog.startswith(prefix) or not head_changelog.endswith(suffix):
              fail("release PR changelog changed outside the generated release section")
          inserted = head_changelog[len(prefix) : len(head_changelog) - len(suffix) if suffix else len(head_changelog)]
          section_pattern = re.compile(
              rf"\n\n## \[{re.escape(release_version)}\] - \d{{4}}-\d{{2}}-\d{{2}}(?:\n\n[\s\S]+)?$"
          )
          if not section_pattern.fullmatch(inserted):
              fail("release PR changelog did not add the expected generated release section")
          PY

      - name: Compute release image metadata
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        id: release-metadata
        run: |
          set -euo pipefail
          RELEASE_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          match = re.search(r'(?m)^\s*version:\s*"(?P<version>[^"]+)"', pathlib.Path("mix.exs").read_text())
          if not match:
              raise SystemExit("project version not found in mix.exs")
          print(match.group("version"))
          PY
          )"
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            printf 'release version was not semantic: %s\n' "$RELEASE_VERSION" >&2
            exit 1
          fi
          if [[ ! "${GITHUB_RUN_NUMBER:-}" =~ ^[0-9]+$ ]]; then
            printf 'workflow run number was not numeric: %s\n' "${GITHUB_RUN_NUMBER:-}" >&2
            exit 1
          fi
          RELEASE_RC_TAG="$RELEASE_VERSION-rc.$GITHUB_RUN_NUMBER"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          printf 'version=%s\n' "$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          printf 'rc-tag=%s\n' "$RELEASE_RC_TAG" >> "$GITHUB_OUTPUT"
          printf 'image=%s\n' "$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release PR image
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.release-metadata.outputs.image }}:${{ env.PR_HEAD_SHA }}
            ${{ steps.release-metadata.outputs.image }}:${{ steps.release-metadata.outputs.rc-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update PR description with package links
        if: ${{ env.IS_RELEASE_PR == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.release-metadata.outputs.image }}
          RELEASE_RC_TAG: ${{ steps.release-metadata.outputs.rc-tag }}
          RELEASE_IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            printf 'published release PR image digest was not sha256-shaped: %s\n' "$RELEASE_IMAGE_DIGEST" >&2
            exit 1
          fi
          current_body="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq .body)"
          block_file="$(mktemp)"
          cat > "$block_file" <<EOF
          <!-- caxton:artifact-links:start -->
          PR artifacts for $PR_HEAD_SHA:

          Docker image SHA tag: $IMAGE:$PR_HEAD_SHA
          Docker image release candidate tag: $IMAGE:$RELEASE_RC_TAG
          Docker image digest: $RELEASE_IMAGE_DIGEST
          <!-- caxton:artifact-links:end -->
          EOF
          body_file="$(mktemp)"
          printf '%s\n' "$current_body" | awk '
            /<!-- caxton:artifact-links:start -->/ { skipping = 1; next }
            /<!-- caxton:artifact-links:end -->/ { skipping = 0; next }
            !skipping { print }
          ' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}' > "$body_file"
          if [ -s "$body_file" ]; then
            printf '\n\n' >> "$body_file"
          fi
          cat "$block_file" >> "$body_file"
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$body_file"
