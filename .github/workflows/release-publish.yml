name: Publish release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_merge_sha:
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' && inputs.release_merge_sha != '' }}
    environment: release-publish
    permissions:
      contents: write
      packages: write
      pull-requests: read
    steps:
      - name: Checkout pushed main commit
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Checkout dispatched release merge commit
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_merge_sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Export pushed release context
        if: ${{ github.event_name == 'push' }}
        env:
          RELEASE_BASE_SHA: ${{ github.event.before }}
          RELEASE_MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          printf 'RELEASE_BASE_SHA=%s\n' "$RELEASE_BASE_SHA" >> "$GITHUB_ENV"
          printf 'RELEASE_MERGE_SHA=%s\n' "$RELEASE_MERGE_SHA" >> "$GITHUB_ENV"

      - name: Export dispatched release context
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_MERGE_SHA: ${{ inputs.release_merge_sha }}
        run: |
          set -euo pipefail
          printf 'RELEASE_BASE_SHA=\n' >> "$GITHUB_ENV"
          printf 'RELEASE_MERGE_SHA=%s\n' "$RELEASE_MERGE_SHA" >> "$GITHUB_ENV"

      - name: Decide whether pushed commit should publish release
        id: release-decision
        env:
          RELEASE_BASE_SHA: ${{ github.event.before }}
          RELEASE_MERGE_SHA: ${{ github.sha }}
          RELEASE_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          should_publish_release=false
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            should_publish_release=true
          elif [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
            changed_files="$(git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_MERGE_SHA")"
            if [ -n "$changed_files" ]; then
              should_publish_release=true
              saw_release_metadata=false
              while IFS= read -r changed_file; do
                case "$changed_file" in
                  mix.exs|mix.lock|CHANGELOG.md)
                    saw_release_metadata=true
                    ;;
                  *)
                    should_publish_release=false
                    ;;
                esac
              done <<EOF
          $changed_files
          EOF
              if [ "$saw_release_metadata" != true ]; then
                should_publish_release=false
              fi
              case "$RELEASE_COMMIT_MESSAGE" in
                "chore: release v"*) ;;
                *) should_publish_release=false ;;
              esac
            fi
          fi
          if [ "$should_publish_release" != true ]; then
            printf 'not a release commit; skip token-bearing publication steps\n'
          fi
          printf 'should_publish_release=%s\n' "$should_publish_release" >> "$GITHUB_OUTPUT"
          printf 'SHOULD_PUBLISH_RELEASE=%s\n' "$should_publish_release" >> "$GITHUB_ENV"

      - name: Validate release provenance and changed files
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_BASE_SHA" ]]; then
            RELEASE_BASE_SHA="$RELEASE_MERGE_SHA^1"
          fi
          [[ "$(git rev-parse HEAD)" == "$RELEASE_MERGE_SHA" ]]
          git merge-base --is-ancestor "$RELEASE_MERGE_SHA" origin/main
          git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_MERGE_SHA" | while IFS= read -r changed_file; do
            case "$changed_file" in
              mix.exs|mix.lock|CHANGELOG.md)
                ;;
              *)
                printf 'refusing token-bearing publish for release PR file: %s\n' "$changed_file" >&2
                exit 1
                ;;
            esac
          done

      - name: Attach merge commit to main
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          git switch -C main "$RELEASE_MERGE_SHA"
          git branch --set-upstream-to=origin/main main

      - name: Derive release version from checked-out metadata
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          match = re.search(r'(?m)^\s*version:\s*"(?P<version>[^"]+)"', pathlib.Path("mix.exs").read_text())
          if not match:
              raise SystemExit("project version not found in mix.exs")
          print(match.group("version"))
          PY
          )"
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            printf 'release version was not semantic: %s\n' "$RELEASE_VERSION" >&2
            exit 1
          fi
          printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Derive release PR head SHA and image digest from the merged release PR
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_MERGE_SHA/pulls" --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            printf 'could not find a pull request associated with release merge commit %s\n' "$RELEASE_MERGE_SHA" >&2
            exit 1
          fi
          pr_json="$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRefOid,body)"
          RELEASE_PR_HEAD_SHA="$(printf '%s' "$pr_json" | jq -r '.headRefOid')"
          RELEASE_IMAGE_DIGEST="$(printf '%s' "$pr_json" | jq -r '.body | capture("Docker image digest:\\s*(?<digest>sha256:[0-9a-f]{64})"; "n").digest // empty')"
          if [[ ! "$RELEASE_PR_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            printf 'release PR head SHA was not 40 hex chars: %s\n' "$RELEASE_PR_HEAD_SHA" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            printf 'release PR image digest was not sha256-shaped: %s\n' "$RELEASE_IMAGE_DIGEST" >&2
            exit 1
          fi
          printf 'RELEASE_PR_NUMBER=%s\n' "$pr_number" >> "$GITHUB_ENV"
          printf 'RELEASE_PR_HEAD_SHA=%s\n' "$RELEASE_PR_HEAD_SHA" >> "$GITHUB_ENV"
          printf 'RELEASE_IMAGE_DIGEST=%s\n' "$RELEASE_IMAGE_DIGEST" >> "$GITHUB_ENV"

      - name: Install skopeo
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          if ! command -v skopeo >/dev/null 2>&1; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update
              apt-get install -y --no-install-recommends skopeo
            else
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends skopeo
            fi
          fi

      - name: Promote release PR image to permanent tags
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          creds="$GHCR_ACTOR:$GHCR_TOKEN"
          skopeo copy --src-creds "$creds" --dest-creds "$creds" \
            "docker://$IMAGE@$RELEASE_IMAGE_DIGEST" "docker://$IMAGE:$RELEASE_VERSION"
          skopeo copy --src-creds "$creds" --dest-creds "$creds" \
            "docker://$IMAGE@$RELEASE_IMAGE_DIGEST" "docker://$IMAGE:latest"

      - name: Extract changelog section for this release
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          if [ -f CHANGELOG.md ]; then
            awk -v version="$RELEASE_VERSION" '
              $0 ~ "^## \\[" version "\\]" { emit = 1; next }
              /^## \[/ { if (emit) exit }
              emit { print }
            ' CHANGELOG.md > "$notes_file"
          fi
          if [ ! -s "$notes_file" ]; then
            printf 'Release v%s\n' "$RELEASE_VERSION" > "$notes_file"
          fi
          printf '\nDocker image: ghcr.io/%s:%s\n' "${GITHUB_REPOSITORY,,}" "$RELEASE_VERSION" >> "$notes_file"
          {
            echo "RELEASE_NOTES<<RELEASE_NOTES_EOF"
            cat "$notes_file"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: v${{ env.RELEASE_VERSION }}
          target_commitish: ${{ env.RELEASE_MERGE_SHA }}
          body: ${{ env.RELEASE_NOTES }}
