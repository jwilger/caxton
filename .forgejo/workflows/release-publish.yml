name: Publish release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_merge_sha:
        required: true
        type: string

jobs:
  release-publish:
    runs-on: docker-release
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' && inputs.release_merge_sha != '' }}
    environment: release-publish
    steps:
      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          PATH="$NIX_BIN_DIR:$PATH" nix profile install \
            nixpkgs#skopeo \
            nixpkgs#tea \
            nixpkgs#jq \
            nixpkgs#curl \
            nixpkgs#coreutils \
            nixpkgs#gawk \
            nixpkgs#gnused
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4
        name: Checkout pushed main commit
        if: ${{ github.event_name == 'push' }}
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/checkout@v4
        name: Checkout dispatched release merge commit
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          ref: ${{ inputs.release_merge_sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Export pushed release context
        if: ${{ github.event_name == 'push' }}
        env:
          RELEASE_BASE_SHA: ${{ github.event.before }}
          RELEASE_MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          printf 'RELEASE_BASE_SHA=%s\n' "$RELEASE_BASE_SHA" >> "$GITHUB_ENV"
          printf 'RELEASE_MERGE_SHA=%s\n' "$RELEASE_MERGE_SHA" >> "$GITHUB_ENV"

      - name: Export dispatched release context
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_MERGE_SHA: ${{ inputs.release_merge_sha }}
        run: |
          set -euo pipefail
          printf 'RELEASE_BASE_SHA=\n' >> "$GITHUB_ENV"
          printf 'RELEASE_MERGE_SHA=%s\n' "$RELEASE_MERGE_SHA" >> "$GITHUB_ENV"

      - name: Decide whether pushed commit should publish release
        id: release-decision
        env:
          RELEASE_BASE_SHA: ${{ github.event.before }}
          RELEASE_MERGE_SHA: ${{ github.sha }}
          RELEASE_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          should_publish_release=false
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            should_publish_release=true
          elif [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
            changed_files="$(git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_MERGE_SHA")"
            if [ -n "$changed_files" ]; then
              should_publish_release=true
              saw_release_metadata=false
              while IFS= read -r changed_file; do
                case "$changed_file" in
                  mix.exs|mix.lock|CHANGELOG.md)
                    saw_release_metadata=true
                    ;;
                  *)
                    should_publish_release=false
                    ;;
                esac
              done <<EOF
          $changed_files
          EOF
              if [ "$saw_release_metadata" != true ]; then
                should_publish_release=false
              fi
              if [[ "$RELEASE_COMMIT_MESSAGE" == "chore: release v"* ]]; then
                :
              else
                should_publish_release=false
              fi
            fi
          fi
          if [ "$should_publish_release" != true ]; then
            printf 'not a release commit; skip token-bearing publication steps\n'
          fi
          printf 'should_publish_release=%s\n' "$should_publish_release" >> "$GITHUB_OUTPUT"
          printf 'SHOULD_PUBLISH_RELEASE=%s\n' "$should_publish_release" >> "$GITHUB_ENV"

      - name: Validate release provenance and changed files
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_BASE_SHA" ]]; then
            RELEASE_BASE_SHA="$RELEASE_MERGE_SHA^1"
          fi
          [[ "$(git rev-parse HEAD)" == "$RELEASE_MERGE_SHA" ]]
          git merge-base --is-ancestor "$RELEASE_MERGE_SHA" origin/main
          git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_MERGE_SHA" | while IFS= read -r changed_file; do
            case "$changed_file" in
              mix.exs|mix.lock|CHANGELOG.md)
                ;;
              .forgejo/workflows/*|scripts/*)
                printf 'refusing token-bearing publish for release PR file: %s\n' "$changed_file" >&2
                exit 1
                ;;
              *)
                printf 'refusing token-bearing publish for release PR file: %s\n' "$changed_file" >&2
                exit 1
                ;;
            esac
          done

      - name: Attach merge commit to main
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          git switch -C main "$RELEASE_MERGE_SHA"
          git branch --set-upstream-to=origin/main main

      - name: Derive release version from checked-out metadata
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          match = re.search(r'(?m)^\s*version:\s*"(?P<version>[^"]+)"', pathlib.Path("mix.exs").read_text())
          if not match:
              raise SystemExit("project version not found in mix.exs")
          print(match.group("version"))
          PY
          )"
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            printf 'release version was not semantic: %s\n' "$RELEASE_VERSION" >&2
            exit 1
          fi
          printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Derive release PR head SHA from merged release commit
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          GITEA_SERVER_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          release_commit_body="$(git log -1 --format=%B "$RELEASE_MERGE_SHA")"
          artifact_metadata="$(RELEASE_COMMIT_BODY="$release_commit_body" python3 - <<'PY'
          import os
          import re
          body = os.environ["RELEASE_COMMIT_BODY"]
          sha = re.search(r'PR artifacts for ([0-9a-fA-F]{40}):', body)
          if not sha:
              sha = re.search(r'caxton:(?:release-v[^\s]*?-)?([0-9a-fA-F]{40})', body)
          digest = re.search(r'Docker image digest:\s*(sha256:[0-9a-f]{64})', body)
          reviewed = re.search(r'Reviewed-on:\s*https://git\.johnwilger\.com/Slipstream/caxton/pulls/(\d+)', body)
          print(f"RELEASE_PR_HEAD_SHA={sha.group(1) if sha else ''}")
          print(f"RELEASE_IMAGE_DIGEST={digest.group(1) if digest else ''}")
          print(f"RELEASE_PR_NUMBER={reviewed.group(1) if reviewed else ''}")
          PY
          )"
          while IFS='=' read -r key value; do
            case "$key" in
              RELEASE_PR_HEAD_SHA) RELEASE_PR_HEAD_SHA="$value" ;;
              RELEASE_IMAGE_DIGEST) RELEASE_IMAGE_DIGEST="$value" ;;
              RELEASE_PR_NUMBER) RELEASE_PR_NUMBER="$value" ;;
            esac
          done <<< "$artifact_metadata"
          if { [ -z "${RELEASE_PR_HEAD_SHA:-}" ] || [ -z "${RELEASE_IMAGE_DIGEST:-}" ]; } && [ -n "${RELEASE_PR_NUMBER:-}" ]; then
            if [ -z "${GITEA_SERVER_TOKEN:-}" ]; then
              printf 'missing RELEASE_PUBLISH_TOKEN for release PR metadata lookup\n' >&2
              exit 1
            fi
            pr_response="$(curl -fsS -H "Authorization: token $GITEA_SERVER_TOKEN" "https://git.johnwilger.com/api/v1/repos/Slipstream/caxton/pulls/$RELEASE_PR_NUMBER")"
            RELEASE_PR_HEAD_SHA="$(printf '%s\n' "$pr_response" | jq -r '.head.sha')"
            RELEASE_IMAGE_DIGEST="$(printf '%s\n' "$pr_response" | jq -r '.body | capture("Docker image digest:\\s*(?<digest>sha256:[0-9a-f]{64})").digest')"
          fi
          if [[ "$RELEASE_PR_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            :
          else
            printf 'release PR head SHA was not 40 hex chars: %s\n' "$RELEASE_PR_HEAD_SHA" >&2
            exit 1
          fi
          if [[ "$RELEASE_IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            :
          else
            printf 'release PR image digest was not sha256-shaped: %s\n' "$RELEASE_IMAGE_DIGEST" >&2
            exit 1
          fi
          printf 'RELEASE_PR_HEAD_SHA=%s\n' "$RELEASE_PR_HEAD_SHA" >> "$GITHUB_ENV"
          printf 'RELEASE_IMAGE_DIGEST=%s\n' "$RELEASE_IMAGE_DIGEST" >> "$GITHUB_ENV"

      - name: Resolve trusted release publication tools
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          SKOPEO=/nix/var/nix/profiles/default/bin/skopeo
          TEA=/nix/var/nix/profiles/default/bin/tea
          JQ=/nix/var/nix/profiles/default/bin/jq
          CURL=/nix/var/nix/profiles/default/bin/curl
          AWK=/nix/var/nix/profiles/default/bin/awk
          MKTEMP=/nix/var/nix/profiles/default/bin/mktemp
          [ -x "$SKOPEO" ]
          [ -x "$TEA" ]
          [ -x "$JQ" ]
          [ -x "$CURL" ]
          [ -x "$AWK" ]
          [ -x "$MKTEMP" ]
          printf 'SKOPEO=%s\n' "$SKOPEO" >> "$GITHUB_ENV"
          printf 'TEA=%s\n' "$TEA" >> "$GITHUB_ENV"
          printf 'JQ=%s\n' "$JQ" >> "$GITHUB_ENV"
          printf 'CURL=%s\n' "$CURL" >> "$GITHUB_ENV"
          printf 'AWK=%s\n' "$AWK" >> "$GITHUB_ENV"
          printf 'MKTEMP=%s\n' "$MKTEMP" >> "$GITHUB_ENV"

      - name: Promote release PR Docker image to Forgejo package registry
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          RELEASE_PUBLISH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/containers"
          cat > "$HOME/.config/containers/policy.json" <<'EOF'
          {"default":[{"type":"insecureAcceptAnything"}]}
          EOF
          if [ -z "${RELEASE_PUBLISH_TOKEN:-}" ]; then
            printf 'missing RELEASE_PUBLISH_TOKEN\n' >&2
            exit 1
          fi
          if [ -z "${RELEASE_BOT_NAME:-}" ]; then
            printf 'missing RELEASE_BOT_NAME repository variable\n' >&2
            exit 1
          fi
          auth_file="${RUNNER_TEMP:-/tmp}/caxton-registry-auth.json"
          umask 077
          : > "$auth_file"
          printf '%s\n' "$RELEASE_PUBLISH_TOKEN" | "$SKOPEO" login --authfile "$auth_file" --username "$RELEASE_BOT_NAME" --password-stdin git.johnwilger.com
          release_pr_source_digest_image="docker://git.johnwilger.com/slipstream/caxton@$RELEASE_IMAGE_DIGEST"
          "$SKOPEO" copy --src-authfile "$auth_file" --dest-authfile "$auth_file" "$release_pr_source_digest_image" "docker://git.johnwilger.com/slipstream/caxton:$RELEASE_VERSION"
          "$SKOPEO" copy --src-authfile "$auth_file" --dest-authfile "$auth_file" "$release_pr_source_digest_image" "docker://git.johnwilger.com/slipstream/caxton:latest"

      - name: Create Forgejo Release
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          GITEA_SERVER_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          GITEA_SERVER_URL: https://git.johnwilger.com
        run: |
          set -euo pipefail
          RELEASE_NOTES_FILE="$($MKTEMP)"
          if [ -f CHANGELOG.md ]; then
            "$AWK" "/^## \\[$RELEASE_VERSION\\]/{emit=1; next} /^## \\[/{if (emit) exit} emit {print}" CHANGELOG.md > "$RELEASE_NOTES_FILE"
          fi
          if [ ! -s "$RELEASE_NOTES_FILE" ]; then
            printf 'Release v%s\n' "$RELEASE_VERSION" > "$RELEASE_NOTES_FILE"
          fi
          printf '\nDocker image: git.johnwilger.com/slipstream/caxton:%s\n' "$RELEASE_VERSION" >> "$RELEASE_NOTES_FILE"
          tea_login="caxton-release-publish-${GITHUB_RUN_ID:-$$}"
          "$TEA" login add --name "$tea_login" --url "$GITEA_SERVER_URL" --token "$GITEA_SERVER_TOKEN"
          "$TEA" release create \
            --login "$tea_login" \
            --repo Slipstream/caxton \
            --tag v$RELEASE_VERSION \
            --target "$RELEASE_MERGE_SHA" \
            --title "v$RELEASE_VERSION" \
            --note-file "$RELEASE_NOTES_FILE"
