name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  compile-dev:
    name: Compile dev code
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install OS build dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends build-essential ca-certificates curl git
          rm -rf /var/lib/apt/lists/*

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: |
          set -euo pipefail
          mix deps.get

      - name: Compile dev code with warnings as errors
        run: mix compile --warnings-as-errors --force

      - name: Pack dev compilation artifact
        run: tar -czf compiled-dev.tar.gz deps _build/dev

      - name: Upload dev compilation artifact
        uses: actions/upload-artifact@v3
        with:
          name: compiled-dev-${{ github.sha }}
          path: compiled-dev.tar.gz
          retention-days: 1

  compile-test:
    name: Compile test code
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install OS build dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends build-essential ca-certificates curl git
          rm -rf /var/lib/apt/lists/*

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: |
          set -euo pipefail
          mix deps.get
          MIX_ENV=test mix deps.get

      - name: Compile test code with warnings as errors
        run: MIX_ENV=test mix compile --warnings-as-errors --force

      - name: Pack test compilation artifact
        run: tar -czf compiled-test.tar.gz deps _build/test

      - name: Upload test compilation artifact
        uses: actions/upload-artifact@v3
        with:
          name: compiled-test-${{ github.sha }}
          path: compiled-test.tar.gz
          retention-days: 1

  compile-prod:
    name: Compile prod code
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install OS build dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends build-essential ca-certificates curl git
          rm -rf /var/lib/apt/lists/*

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: |
          set -euo pipefail
          MIX_ENV=prod mix deps.get --only prod

      - name: Compile prod code with warnings as errors
        run: MIX_ENV=prod mix compile --warnings-as-errors --force

      - name: Pack prod compilation artifact
        run: tar -czf compiled-prod.tar.gz deps _build/prod

      - name: Upload prod compilation artifact
        uses: actions/upload-artifact@v3
        with:
          name: compiled-prod-${{ github.sha }}
          path: compiled-prod.tar.gz
          retention-days: 1

  quality-checks:
    name: Test and quality checks
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' }}
    needs:
      - compile-dev
      - compile-test
      - compile-prod
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install OS build dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends build-essential ca-certificates curl git
          rm -rf /var/lib/apt/lists/*

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Install Hex and Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Show toolchain versions
        run: |
          set -euo pipefail
          elixir --version
          mix --version

      - name: Restore compiled dev artifact
        uses: actions/download-artifact@v3
        with:
          name: compiled-dev-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack compiled dev artifact
        run: tar -xzf ci-artifacts/compiled-dev.tar.gz

      - name: Restore compiled test artifact
        uses: actions/download-artifact@v3
        with:
          name: compiled-test-${{ github.sha }}
          path: ci-artifacts

      - name: Unpack compiled test artifact
        run: tar -xzf ci-artifacts/compiled-test.tar.gz

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run asset tests
        run: node --test assets/test/*.mjs

      - name: Run tests with warnings as errors
        run: mix test --warnings-as-errors

      - name: Run Dialyzer
        run: mix dialyzer --halt-exit-status

      - name: Run Credo
        run: mix credo --strict

      - name: Run Sobelow
        run: mix sobelow --exit

      - name: Run dependency audit
        run: mix deps.audit

  pr-artifact-build:
    name: Build release PR image artifact
    runs-on: docker-release
    needs: quality-checks
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Skip non-release PR artifact build
        if: ${{ !(startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          printf 'Skipping release PR artifact build for ordinary non-release PR.\n'

      - uses: actions/checkout@v4
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Validate release PR artifact provenance
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          RELEASE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          RELEASE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_BOT_NAME:-}" ]; then
            printf 'missing RELEASE_BOT_NAME repository variable\n' >&2
            exit 1
          fi
          if [ "$(git log -1 --format=%an "$RELEASE_HEAD_SHA")" != "$RELEASE_BOT_NAME" ]; then
            printf 'release PR head commit author was not %s\n' "$RELEASE_BOT_NAME" >&2
            exit 1
          fi
          if [[ "$(git log -1 --format=%s "$RELEASE_HEAD_SHA")" == "chore: release v"* ]]; then
            :
          else
            printf 'release PR head commit message was not a release commit\n' >&2
            exit 1
          fi
          changed_files="$(git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_HEAD_SHA")"
          if [ -z "$changed_files" ]; then
            printf 'release PR did not change release metadata\n' >&2
            exit 1
          fi
          while IFS= read -r changed_file; do
            case "$changed_file" in
              mix.exs|CHANGELOG.md)
                ;;
              *)
                printf 'refusing token-bearing PR package publish for release PR file: %s\n' "$changed_file" >&2
                exit 1
                ;;
            esac
          done <<< "$changed_files"
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys

          base_sha = os.environ["RELEASE_BASE_SHA"]
          head_sha = os.environ["RELEASE_HEAD_SHA"]
          release_branch = os.environ["RELEASE_BRANCH"]


          def git_show(revision, path):
              return subprocess.check_output(
                  ["git", "show", f"{revision}:{path}"],
                  text=True,
              )


          def fail(message):
              print(message, file=sys.stderr)
              raise SystemExit(1)


          version_pattern = re.compile(r'(?m)^(\s*version:\s*")(?P<version>[^"]+)(",\s*)$')
          base_mix = git_show(base_sha, "mix.exs")
          head_mix = git_show(head_sha, "mix.exs")
          base_version = version_pattern.search(base_mix)
          head_version = version_pattern.search(head_mix)
          if not base_version or not head_version:
              fail("project version not found in release PR mix.exs")
          release_version = head_version.group("version")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?", release_version):
              fail(f"release version was not semantic: {release_version}")
          expected_mix = (
              base_mix[: base_version.start()]
              + base_version.group(1)
              + release_version
              + base_version.group(3)
              + base_mix[base_version.end() :]
          )
          if head_mix != expected_mix:
              fail("release PR mix.exs changed more than the project version")
          if release_branch != f"release/v{release_version}":
              fail("release PR branch did not match the release version")

          marker = "<!-- release-prepare inserts generated release sections below this line -->"
          base_changelog = git_show(base_sha, "CHANGELOG.md")
          head_changelog = git_show(head_sha, "CHANGELOG.md")
          marker_index = base_changelog.find(marker)
          if marker_index < 0:
              fail("changelog release insertion marker not found")
          prefix_end = marker_index + len(marker)
          prefix = base_changelog[:prefix_end]
          suffix = base_changelog[prefix_end:]
          if not head_changelog.startswith(prefix) or not head_changelog.endswith(suffix):
              fail("release PR changelog changed outside the generated release section")
          inserted = head_changelog[len(prefix) : len(head_changelog) - len(suffix) if suffix else len(head_changelog)]
          section_pattern = re.compile(
              rf"\n\n## \[{re.escape(release_version)}\] - \d{{4}}-\d{{2}}-\d{{2}}(?:\n\n[\s\S]+)?$"
          )
          if not section_pattern.fullmatch(inserted):
              fail("release PR changelog did not add the expected generated release section")
          PY

      - name: Build release PR Docker image archive
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          mkdir -p pr-publication-artifacts
          RELEASE_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          match = re.search(r'(?m)^\s*version:\s*"(?P<version>[^"]+)"', pathlib.Path("mix.exs").read_text())
          if not match:
              raise SystemExit("project version not found in mix.exs")
          print(match.group("version"))
          PY
          )"
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            printf 'release version was not semantic: %s\n' "$RELEASE_VERSION" >&2
            exit 1
          fi
          if [[ ! "${GITHUB_RUN_NUMBER:-}" =~ ^[0-9]+$ ]]; then
            printf 'workflow run number was not numeric: %s\n' "${GITHUB_RUN_NUMBER:-}" >&2
            exit 1
          fi
          RELEASE_RC_TAG="$RELEASE_VERSION-rc.$GITHUB_RUN_NUMBER"
          docker build --pull --tag "caxton-artifact:$PR_HEAD_SHA" .
          docker save "caxton-artifact:$PR_HEAD_SHA" -o pr-publication-artifacts/caxton-image.tar
          printf 'PR_NUMBER=%s\nPR_HEAD_SHA=%s\nRELEASE_VERSION=%s\nRELEASE_RC_TAG=%s\n' "$PR_NUMBER" "$PR_HEAD_SHA" "$RELEASE_VERSION" "$RELEASE_RC_TAG" > pr-publication-artifacts/pr-metadata.env

      - uses: actions/upload-artifact@v3
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          name: pr-publication-artifacts
          path: pr-publication-artifacts

  pr-packages:
    name: Publish release PR packages
    runs-on: ubuntu-24.04
    needs: pr-artifact-build
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Skip non-release PR artifact publication
        if: ${{ !(startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          printf 'Skipping release PR artifact publication for ordinary non-release PR.\n'

      - uses: actions/download-artifact@v3
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          name: pr-publication-artifacts
          path: pr-publication-artifacts

      - name: Install or reuse Nix
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          PATH="$NIX_BIN_DIR:$PATH" nix profile install \
            nixpkgs#skopeo \
            nixpkgs#jq \
            nixpkgs#curl \
            nixpkgs#coreutils \
            nixpkgs#gawk \
            nixpkgs#gnused
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Resolve trusted PR package tools
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          SKOPEO=/nix/var/nix/profiles/default/bin/skopeo
          JQ=/nix/var/nix/profiles/default/bin/jq
          CURL=/nix/var/nix/profiles/default/bin/curl
          MKTEMP=/nix/var/nix/profiles/default/bin/mktemp
          CAT=/nix/var/nix/profiles/default/bin/cat
          AWK=/nix/var/nix/profiles/default/bin/awk
          SED=/nix/var/nix/profiles/default/bin/sed
          MKDIR=/nix/var/nix/profiles/default/bin/mkdir
          [ -x "$SKOPEO" ]
          [ -x "$JQ" ]
          [ -x "$CURL" ]
          [ -x "$MKTEMP" ]
          [ -x "$CAT" ]
          [ -x "$AWK" ]
          [ -x "$SED" ]
          [ -x "$MKDIR" ]
          printf 'SKOPEO=%s\n' "$SKOPEO" >> "$GITHUB_ENV"
          printf 'JQ=%s\n' "$JQ" >> "$GITHUB_ENV"
          printf 'CURL=%s\n' "$CURL" >> "$GITHUB_ENV"
          printf 'MKTEMP=%s\n' "$MKTEMP" >> "$GITHUB_ENV"
          printf 'CAT=%s\n' "$CAT" >> "$GITHUB_ENV"
          printf 'AWK=%s\n' "$AWK" >> "$GITHUB_ENV"
          printf 'SED=%s\n' "$SED" >> "$GITHUB_ENV"
          printf 'MKDIR=%s\n' "$MKDIR" >> "$GITHUB_ENV"

      - name: Publish release PR Docker image package
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          RELEASE_PUBLISH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
        run: |
          set -euo pipefail
          unset BASH_ENV ENV LD_PRELOAD LD_LIBRARY_PATH DYLD_INSERT_LIBRARIES PYTHONPATH PERL5LIB RUBYLIB NODE_OPTIONS
          PR_HEAD_SHA=""
          RELEASE_VERSION=""
          RELEASE_RC_TAG=""
          while IFS='=' read -r key value; do
            case "$key" in
              PR_NUMBER) PR_NUMBER="$value" ;;
              PR_HEAD_SHA) PR_HEAD_SHA="$value" ;;
              RELEASE_VERSION) RELEASE_VERSION="$value" ;;
              RELEASE_RC_TAG) RELEASE_RC_TAG="$value" ;;
            esac
          done < pr-publication-artifacts/pr-metadata.env
          if [ -z "$RELEASE_VERSION" ]; then
            printf 'release PR artifact metadata did not include RELEASE_VERSION\n' >&2
            exit 1
          fi
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]] || [[ ! "$PR_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || [[ ! "$RELEASE_RC_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?-rc\.[0-9]+$ ]]; then
            printf 'invalid release PR artifact metadata\n' >&2
            exit 1
          fi
          if [ -z "${RELEASE_PUBLISH_TOKEN:-}" ] || [ -z "${RELEASE_BOT_NAME:-}" ]; then
            printf 'missing RELEASE_PUBLISH_TOKEN or RELEASE_BOT_NAME for PR package publication\n' >&2
            exit 1
          fi
          auth_file="${RUNNER_TEMP:-/tmp}/caxton-registry-auth.json"
          umask 077
          : > "$auth_file"
          printf '%s\n' "$RELEASE_PUBLISH_TOKEN" | "$SKOPEO" login --authfile "$auth_file" --username "$RELEASE_BOT_NAME" --password-stdin git.johnwilger.com
          "$MKDIR" -p "$HOME/.config/containers"
          "$CAT" > "$HOME/.config/containers/policy.json" <<'EOF'
          {"default":[{"type":"insecureAcceptAnything"}]}
          EOF
          published_sha_image="docker://git.johnwilger.com/slipstream/caxton:$PR_HEAD_SHA"
          published_rc_image="docker://git.johnwilger.com/slipstream/caxton:$RELEASE_RC_TAG"
          "$SKOPEO" copy --dest-authfile "$auth_file" docker-archive:pr-publication-artifacts/caxton-image.tar "$published_sha_image"
          "$SKOPEO" copy --dest-authfile "$auth_file" docker-archive:pr-publication-artifacts/caxton-image.tar "$published_rc_image"
          release_image_digest="$("$SKOPEO" inspect --authfile "$auth_file" "$published_sha_image" | "$JQ" -r '.Digest')"
          release_rc_image_digest="$("$SKOPEO" inspect --authfile "$auth_file" "$published_rc_image" | "$JQ" -r '.Digest')"
          if [[ ! "$release_image_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            printf 'published release PR image digest was not sha256-shaped: %s\n' "$release_image_digest" >&2
            exit 1
          fi
          if [ "$release_rc_image_digest" != "$release_image_digest" ]; then
            printf 'published release PR image tags resolved to different digests: %s != %s\n' "$release_rc_image_digest" "$release_image_digest" >&2
            exit 1
          fi
          printf 'RELEASE_IMAGE_DIGEST=%s\n' "$release_image_digest" >> "$GITHUB_ENV"

      - name: Update PR description with package links
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GITEA_SERVER_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          GITEA_SERVER_URL: https://git.johnwilger.com
          CURRENT_PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          unset BASH_ENV ENV LD_PRELOAD LD_LIBRARY_PATH DYLD_INSERT_LIBRARIES PYTHONPATH PERL5LIB RUBYLIB NODE_OPTIONS
          PR_HEAD_SHA=""
          RELEASE_VERSION=""
          RELEASE_RC_TAG=""
          while IFS='=' read -r key value; do
            case "$key" in
              PR_NUMBER) PR_NUMBER="$value" ;;
              PR_HEAD_SHA) PR_HEAD_SHA="$value" ;;
              RELEASE_VERSION) RELEASE_VERSION="$value" ;;
              RELEASE_RC_TAG) RELEASE_RC_TAG="$value" ;;
            esac
          done < pr-publication-artifacts/pr-metadata.env
          if [ -z "$RELEASE_VERSION" ]; then
            printf 'release PR artifact metadata did not include RELEASE_VERSION\n' >&2
            exit 1
          fi
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]] || [[ ! "$PR_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || [[ ! "$RELEASE_RC_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?-rc\.[0-9]+$ ]] || [[ ! "${RELEASE_IMAGE_DIGEST:-}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            printf 'invalid release PR artifact metadata\n' >&2
            exit 1
          fi
          body_file="$($MKTEMP)"
          block_file="$($MKTEMP)"
          "$CAT" > "$block_file" <<EOF
          <!-- caxton:artifact-links:start -->
          PR artifacts for $PR_HEAD_SHA:

          Docker image SHA tag: git.johnwilger.com/slipstream/caxton:$PR_HEAD_SHA
          Docker image release candidate tag: git.johnwilger.com/slipstream/caxton:$RELEASE_RC_TAG
          Docker image digest: $RELEASE_IMAGE_DIGEST
          <!-- caxton:artifact-links:end -->
          EOF
          printf '%s\n' "$CURRENT_PR_BODY" | "$AWK" '
            /<!-- caxton:artifact-links:start -->/ { skipping = 1; next }
            /<!-- caxton:artifact-links:end -->/ { skipping = 0; next }
            !skipping { print }
          ' | "$SED" -e :a -e '/^\n*$/{$d;N;ba' -e '}' > "$body_file"
          if [ -s "$body_file" ]; then
            printf '\n\n' >> "$body_file"
          fi
          "$CAT" "$block_file" >> "$body_file"
          "$JQ" -n --arg body "$("$CAT" "$body_file")" '{body: $body}' > "$body_file.json"
          "$CURL" -fsS -X PATCH \
            -H "Authorization: token $GITEA_SERVER_TOKEN" \
            -H "Content-Type: application/json" \
            --data @"$body_file.json" \
            "$GITEA_SERVER_URL/api/v1/repos/Slipstream/caxton/pulls/$PR_NUMBER"
